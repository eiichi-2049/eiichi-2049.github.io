<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>音乐作品 · EiiChi_2049</title>
    <meta name="description" content="EiiChi 音乐作品集" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;1,9..144,300;1,9..144,400&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&display=swap"
          rel="stylesheet" />
    <style>
        /* ── 本地字体 ──────────────────────────────────────── */
        @font-face {
            font-family: "OPPO Sans";
            src: url("../fronts/OPPO_Sans_4.0/OPPO Sans 4.0.ttf") format("truetype");
            font-weight: 400;
            font-style: normal;
            font-display: swap;
        }

        /* ── 核心变量（与首页保持一致） ──────────────────────── */
        :root {
            --paper: #f5f0e8;
            --paper2: #ede8df;
            --ink: #1a1714;
            --ink2: #3d3830;
            --ink3: #7a7469;
            --ink4: #b8b0a4;
            --rule: rgba(26, 23, 20, 0.1);
            --rule-h: rgba(26, 23, 20, 0.22);
            --red: #c0392b;
            --serif: "Fraunces", serif;
            --zh: "OPPO Sans", "Noto Sans SC", sans-serif;
            --mono: "DM Mono", monospace;
            --ease: cubic-bezier(0.16, 1, 0.3, 1);
            --player-h: 80px;
        }

        /* ── 重置 ────────────────────────────────────────────── */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--mono);
            background: var(--paper);
            color: var(--ink);
            font-size: 13px;
            line-height: 1.7;
            min-height: 100vh;
            padding-bottom: calc(var(--player-h) + 2rem);
        }

            /* 纸质纹理 */
            body::after {
                content: "";
                position: fixed;
                inset: 0;
                background-image: repeating-linear-gradient(0deg, transparent, transparent 27px, rgba(26, 23, 20, 0.025) 27px, rgba(26, 23, 20, 0.025) 28px);
                pointer-events: none;
                z-index: 0;
            }

        /* ── 顶部导航条 ──────────────────────────────────────── */
        .nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            height: 56px;
            border-bottom: 1px solid var(--rule);
            background: rgba(245, 240, 232, 0.92);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            padding: 0 3rem;
        }

        .nav-inner {
            max-width: 1080px;
            margin: 0 auto;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .nav-logo {
            font-family: var(--serif);
            font-size: 17px;
            font-weight: 300;
            font-style: italic;
            color: var(--ink);
            text-decoration: none;
            letter-spacing: -0.01em;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            list-style: none;
        }

        .nav-links a {
            font-size: 11px;
            color: var(--ink3);
            text-decoration: none;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            transition: color 0.2s;
            position: relative;
        }

        .nav-links a::after {
            content: "";
            position: absolute;
            bottom: -2px;
            left: 0;
            right: 0;
            height: 1px;
            background: var(--red);
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.25s var(--ease);
        }

        .nav-links a:hover {
            color: var(--ink);
        }

        .nav-links a:hover::after {
            transform: scaleX(1);
        }

        /* ── 页面主体 ────────────────────────────────────────── */
        .page-wrap {
            max-width: 1080px;
            margin: 0 auto;
            padding: 88px 3rem 2rem;
            position: relative;
            z-index: 2;
        }

        /* ── 页面 Hero ──────────────────────────────────────── */
        .page-header {
            margin-bottom: 2rem;
        }
        .page-header::after {
            content: "";
            display: block;
            height: 6px;
            margin-top: 0.5rem;
            background:
                linear-gradient(to right, transparent 0%, var(--ink3) 10%, var(--ink3) 90%, transparent 100%) 50% 50% / 100% 1px no-repeat,
                linear-gradient(to right, transparent 0%, var(--ink3) 15%, var(--ink3) 85%, transparent 100%) 50% calc(50% + 2.5px) / 100% 0.5px no-repeat;
            opacity: 0.45;
        }

        .page-back {
            font-size: 11px;
            color: var(--ink3);
            text-decoration: none;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 2rem;
            transition: color 0.2s;
        }

            .page-back:hover {
                color: var(--red);
            }

        .page-title {
            font-family: var(--serif);
            font-size: clamp(2.4rem, 5vw, 4rem);
            font-weight: 300;
            line-height: 1.1;
            color: var(--ink);
            margin-bottom: 1.75rem;
            letter-spacing: -0.02em;
        }

            .page-title em {
                font-style: italic;
                color: var(--red);
            }

        .page-desc {
            font-size: 13px;
            color: var(--ink3);
            max-width: 620px;
            line-height: 1.9;
        }

        /* ── 单个专辑模块 ────────────────────────────────────── */
        .album-section {
            margin-bottom: 4rem;
        }

            .album-section:last-of-type {
                margin-bottom: 2rem;
            }

            .album-section .album-header {
                margin-bottom: 1.5rem;
                display: flex;
                flex-wrap: wrap;
                align-items: baseline;
                justify-content: space-between;
                border-bottom: 1px solid var(--rule);
                padding-bottom: 0.5rem;
            }

            .album-section .album-title {
                font-family: var(--serif);
                font-size: 1.6rem;
                font-weight: 300;
                color: var(--ink);
                letter-spacing: -0.01em;
            }

                .album-section .album-title small {
                    font-size: 0.7rem;
                    color: var(--ink3);
                    font-style: italic;
                    font-weight: 300;
                    margin-left: 0.5rem;
                }

            .album-section .album-meta {
                font-size: 12px;
                color: var(--ink3);
                font-style: italic;
                display: flex;
                gap: 1rem;
                flex-wrap: wrap;
            }

                .album-section .album-meta strong {
                    color: var(--ink2);
                    font-style: normal;
                    font-weight: 400;
                }

        /* ── 专辑封面 + 曲目列表（两栏） ────────────────────── */
        .album-grid {
            display: grid;
            grid-template-columns: 240px 1fr;
            gap: 2rem;
            align-items: start;
        }

        /* 左栏：封面 */
        .cover-wrapper {
            position: relative;
            aspect-ratio: 1 / 1;
            border-radius: 4px;
            overflow: hidden;
            border: 1px solid var(--rule);
            background: var(--paper2);
            box-shadow: 0 4px 20px rgba(26, 23, 20, 0.06);
            transition: box-shadow 0.4s var(--ease);
        }

            .cover-wrapper:hover {
                box-shadow: 0 8px 32px rgba(26, 23, 20, 0.10);
            }

            .cover-wrapper img {
                width: 100%;
                height: 100%;
                object-fit: cover;
                display: block;
            }

        .cover-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: var(--grad);
            color: var(--ink3);
            font-family: var(--zh);
            font-weight: 300;
            text-align: center;
            padding: 1.5rem;
            position: relative;
            overflow: hidden;
        }

            .cover-placeholder::before {
                content: "";
                position: absolute;
                inset: 0;
                background: repeating-linear-gradient(45deg, transparent, transparent 20px, rgba(255,255,255,0.03) 20px, rgba(255,255,255,0.03) 21px);
                pointer-events: none;
            }

            .cover-placeholder .big-icon {
                font-size: 2.8rem;
                opacity: 0.5;
                margin-bottom: 0.3rem;
                filter: drop-shadow(0 2px 8px rgba(0,0,0,0.1));
                position: relative;
            }

        /* 右栏：曲目列表 */
        .tracklist {
            display: flex;
            flex-direction: column;
            gap: 2px;
            background: var(--rule);
            border-radius: 4px;
            overflow: hidden;
            border: 1px solid var(--rule);
        }

        .track-item {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            padding: 0.6rem 1rem;
            background: var(--paper);
            cursor: pointer;
            transition: background 0.2s var(--ease), border-color 0.2s var(--ease);
            border-left: 2px solid transparent;
            position: relative;
            user-select: none;
        }

            .track-item:hover {
                background: var(--paper2);
            }

            .track-item:active {
                transform: scale(0.99);
            }

            .track-item .track-index {
                font-size: 11px;
                color: var(--ink4);
                font-weight: 300;
                min-width: 1.8rem;
                letter-spacing: 0.04em;
                font-variant-numeric: tabular-nums;
                transition: color 0.2s var(--ease);
            }

            .track-item .track-info {
                flex: 1;
                min-width: 0;
            }

            .track-item .track-title {
                font-size: 13px;
                color: var(--ink2);
                font-family: var(--zh);
                font-weight: 300;
                letter-spacing: 0.02em;
                transition: color 0.2s var(--ease);
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }

            .track-item .track-duration {
                font-size: 11px;
                color: var(--ink4);
                font-variant-numeric: tabular-nums;
                letter-spacing: 0.04em;
                transition: color 0.2s var(--ease);
                flex-shrink: 0;
            }

            .track-item .track-indicator {
                width: 6px;
                height: 6px;
                border-radius: 50%;
                background: transparent;
                transition: background 0.3s var(--ease), transform 0.3s var(--ease);
                flex-shrink: 0;
                margin-left: -0.25rem;
            }

            /* 当前播放高亮 */
            .track-item.active {
                background: rgba(192, 57, 43, 0.06);
                border-left-color: var(--red);
            }

                .track-item.active .track-index {
                    color: var(--red);
                    font-weight: 500;
                }

                .track-item.active .track-title {
                    color: var(--red);
                }

                .track-item.active .track-duration {
                    color: var(--ink3);
                }

                .track-item.active .track-indicator {
                    background: var(--red);
                    transform: scale(1);
                }

                .track-item.active .track-indicator.playing {
                    animation: breathing 1.8s ease-in-out infinite;
                    background: var(--red);
                    }

        @keyframes breathing {
            0%, 100% {
                transform: scale(0.85);
                opacity: 0.5;
                box-shadow: 0 0 4px rgba(192, 57, 43, 0.15);
            }

            50% {
                transform: scale(1.2);
                opacity: 1;
                box-shadow: 0 0 20px rgba(192, 57, 43, 0.6);
            }
        }

        @keyframes pulse-dot {
            0%, 100% {
                transform: scale(1);
                opacity: 1;
            }

            50% {
                transform: scale(0.6);
                opacity: 0.5;
            }
        }

        /* ── 选项卡导航 ──────────────────────────────────────── */
        .tab-bar {
            display: flex;
            gap: 0;
            margin-bottom: 2.5rem;
            border-bottom: 1px solid var(--rule);
            position: relative;
        }

        .tab-btn {
            font-family: var(--mono);
            font-size: 12px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--ink3);
            background: none;
            border: none;
            padding: 0.75rem 1.5rem;
            cursor: pointer;
            transition: color 0.2s var(--ease), background 0.2s var(--ease);
            position: relative;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

            .tab-btn:hover {
                color: var(--ink);
                background: var(--paper2);
            }

            .tab-btn::after {
                content: "";
                position: absolute;
                bottom: -1px;
                left: 0;
                right: 0;
                height: 2px;
                background: var(--red);
                transform: scaleX(0);
                transition: transform 0.3s var(--ease);
            }

            .tab-btn.active {
                color: var(--ink);
            }

                .tab-btn.active::after {
                    transform: scaleX(1);
                }

        .tab-content {
            display: none;
        }

            .tab-content.active {
                display: block;
                animation: tabFadeIn 0.35s var(--ease);
            }

        @keyframes tabFadeIn {
            0% {
                opacity: 0;
                transform: translateY(8px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ── SFX 分类卡片 ──────────────────────────────────── */
        .sfx-section {
            margin-bottom: 3rem;
        }

            .sfx-section .sfx-header {
                display: flex;
                align-items: baseline;
                justify-content: space-between;
                border-bottom: 1px solid var(--rule);
                padding-bottom: 0.5rem;
                margin-bottom: 1rem;
            }

            .sfx-section .sfx-title {
                font-family: var(--serif);
                font-size: 1.3rem;
                font-weight: 300;
                color: var(--ink);
                letter-spacing: -0.01em;
            }

            .sfx-section .sfx-count {
                font-size: 11px;
                color: var(--ink4);
                font-style: italic;
            }

        .sfx-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1rem;
        }

        .sfx-card {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            padding: 0.75rem 1rem;
            background: var(--paper);
            border: 1px solid var(--rule);
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s var(--ease), border-color 0.2s var(--ease), transform 0.2s var(--ease);
            user-select: none;
        }

            .sfx-card:hover {
                background: var(--paper2);
                border-color: var(--rule-h);
            }

            .sfx-card:active {
                transform: scale(0.98);
            }

            .sfx-card .sfx-icon {
                font-size: 1.2rem;
                opacity: 0.5;
                flex-shrink: 0;
                width: 28px;
                text-align: center;
            }

            .sfx-card .sfx-info {
                flex: 1;
                min-width: 0;
            }

            .sfx-card .sfx-label {
                font-size: 12px;
                font-family: var(--zh);
                font-weight: 300;
                color: var(--ink2);
                letter-spacing: 0.02em;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }

            .sfx-card .sfx-tags {
                font-size: 10px;
                color: var(--ink4);
                font-family: var(--mono);
                letter-spacing: 0.04em;
            }

            .sfx-card .sfx-duration {
                font-size: 11px;
                color: var(--ink4);
                font-variant-numeric: tabular-nums;
                flex-shrink: 0;
            }

            .sfx-card .sfx-play-btn {
                width: 28px;
                height: 28px;
                border-radius: 50%;
                border: 1px solid var(--rule-h);
                background: var(--paper);
                color: var(--ink3);
                font-size: 11px;
                cursor: pointer;
                display: flex;
                align-items: center;
                justify-content: center;
                transition: background 0.2s var(--ease), color 0.2s var(--ease), border-color 0.2s var(--ease);
                flex-shrink: 0;
            }

                .sfx-card .sfx-play-btn:hover {
                    background: var(--red);
                    color: #fff;
                    border-color: var(--red);
                }

            .sfx-card.active {
                background: rgba(192, 57, 43, 0.06);
                border-color: var(--red);
            }

                .sfx-card.active .sfx-label {
                    color: var(--red);
                }

        /* ── 分隔线 ──────────────────────────────────────────── */
        .divider {
            border: none;
            border-top: 1px solid var(--rule);
            margin: 2rem 0;
        }

        /* ── 底部播放器（固定） ──────────────────────────────── */
        .player-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 99;
            height: var(--player-h);
            background: rgba(245, 240, 232, 0.94);
            backdrop-filter: blur(14px);
            border-top: 1px solid var(--rule);
            display: flex;
            align-items: center;
            padding: 0 3rem;
            transition: transform 0.4s var(--ease);
        }

            .player-bar .player-inner {
                max-width: 1080px;
                margin: 0 auto;
                width: 100%;
                display: flex;
                align-items: center;
                gap: 1.25rem;
            }

        .player-now {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            min-width: 160px;
            max-width: 220px;
            flex-shrink: 0;
        }

            .player-now .now-thumb {
                width: 36px;
                height: 36px;
                border-radius: 2px;
                overflow: hidden;
                border: 1px solid var(--rule);
                flex-shrink: 0;
                background: var(--paper2);
            }

                .player-now .now-thumb img {
                    width: 100%;
                    height: 100%;
                    object-fit: cover;
                    display: block;
                }

            .player-now .now-meta {
                min-width: 0;
            }

            .player-now .now-title {
                font-size: 12px;
                font-family: var(--zh);
                font-weight: 300;
                color: var(--ink);
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
                letter-spacing: 0.02em;
            }

            .player-now .now-artist {
                font-size: 10px;
                color: var(--ink4);
                font-style: italic;
                letter-spacing: 0.04em;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }

        .player-controls {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-shrink: 0;
        }

            .player-controls button {
                background: none;
                border: none;
                color: var(--ink2);
                font-size: 18px;
                cursor: pointer;
                padding: 4px 6px;
                border-radius: 2px;
                transition: color 0.2s var(--ease), background 0.2s var(--ease);
                display: flex;
                align-items: center;
                justify-content: center;
                font-family: var(--mono);
                line-height: 1;
            }

                .player-controls button:hover {
                    color: var(--ink);
                    background: var(--paper2);
                }

                .player-controls button:active {
                    transform: scale(0.92);
                }

            .player-controls .btn-play {
                font-size: 26px;
                color: var(--red);
                width: 40px;
                height: 40px;
                border-radius: 50%;
                background: rgba(192, 57, 43, 0.08);
                transition: background 0.2s var(--ease), color 0.2s var(--ease), transform 0.2s var(--ease);
            }

                .player-controls .btn-play:hover {
                    background: rgba(192, 57, 43, 0.15);
                    color: var(--red);
                }

                .player-controls .btn-play:active {
                    transform: scale(0.88);
                }

            .player-controls .btn-skip {
                font-size: 16px;
                color: var(--ink3);
            }

                .player-controls .btn-skip:hover {
                    color: var(--ink);
                }

        .player-progress-wrap {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            min-width: 120px;
        }

        .player-time {
            font-size: 10px;
            color: var(--ink4);
            font-variant-numeric: tabular-nums;
            letter-spacing: 0.04em;
            flex-shrink: 0;
            min-width: 36px;
        }

            .player-time.current {
                text-align: right;
            }

            .player-time.total {
                text-align: left;
            }

        .player-progress {
            flex: 1;
            height: 3px;
            background: var(--rule-h);
            border-radius: 2px;
            cursor: pointer;
            position: relative;
            transition: height 0.15s var(--ease);
        }

            .player-progress:hover {
                height: 5px;
            }

            .player-progress .progress-fill {
                height: 100%;
                width: 0%;
                background: var(--red);
                border-radius: 2px;
                transition: width 0.05s linear;
                position: relative;
            }

                .player-progress .progress-fill::after {
                    content: "";
                    position: absolute;
                    right: -5px;
                    top: 50%;
                    transform: translateY(-50%);
                    width: 10px;
                    height: 10px;
                    border-radius: 50%;
                    background: var(--red);
                    opacity: 0;
                    transition: opacity 0.2s var(--ease);
                    box-shadow: 0 0 8px rgba(192, 57, 43, 0.2);
                }

            .player-progress:hover .progress-fill::after {
                opacity: 1;
            }

        /* ── 页脚 ────────────────────────────────────────────── */
        .footer-sub {
            border-top: 1px solid var(--rule);
            padding: 1.25rem 0 0.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 11px;
            color: var(--ink4);
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-top: 1rem;
        }

            .footer-sub a {
                color: var(--ink3);
                text-decoration: none;
                transition: color 0.2s;
            }

                .footer-sub a:hover {
                    color: var(--ink);
                }

        /* ── 响应式 ──────────────────────────────────────────── */
        @media (max-width: 820px) {
            .album-grid {
                grid-template-columns: 1fr;
                gap: 1.5rem;
            }

            .cover-wrapper {
                max-width: 220px;
                margin: 0 auto;
            }

            .player-now {
                min-width: 100px;
                max-width: 140px;
            }

                .player-now .now-thumb {
                    width: 28px;
                    height: 28px;
                }

            .player-bar {
                padding: 0 1rem;
            }

            .player-controls .btn-play {
                width: 34px;
                height: 34px;
                font-size: 22px;
            }

            .player-progress-wrap {
                min-width: 60px;
            }
        }

        @media (max-width: 768px) {
            .nav {
                padding: 0 1.5rem;
            }

            .page-wrap {

        });
        }

        /* =========================================================
        更新高亮（Music）
        ========================================================= */
        function updateHighlights() {
        const allItems = container.querySelectorAll('.track-item');
        allItems.forEach(item => {
        const aIdx = parseInt(item.dataset.albumIndex);
        const sIdx = parseInt(item.dataset.songIndex);
        const isActive = (aIdx === currentAlbumIndex && sIdx === currentSongIndex);
        item.classList.toggle('active', isActive);
        const dot = item.querySelector('.track-indicator');
        if (isActive && isPlaying) {
        dot.classList.add('playing');
        } else {
        dot.classList.remove('playing');
        }
        });
        }

        /* =========================================================
        更新高亮（SFX）
        ========================================================= */
        function updateSfxHighlights() {
        const allCards = sfxContainer.querySelectorAll('.sfx-card');
        allCards.forEach(card => {
        const cIdx = parseInt(card.dataset.catIndex);
        const sIdx = parseInt(card.dataset.soundIndex);
        const isActive = (cIdx === currentSfxCategory && sIdx === currentSfxIndex);
        card.classList.toggle('active', isActive);
        const btn = card.querySelector('.sfx-play-btn');
        if (isActive && isPlaying) {
        btn.textContent = '❚❚';
        btn.style.background = 'var(--red)';
        btn.style.color = '#fff';
        } else {
        btn.textContent = '▶';
        btn.style.background = '';
        btn.style.color = '';
        }
        });
        }

        /* =========================================================
        播放核心 — Music
        ========================================================= */
        function playSong(albumIdx, songIdx) {
        const album = ALBUMS[albumIdx];
        if (!album) return;
        const song = album.songs[songIdx];
        if (!song) return;

        currentAlbumIndex = albumIdx;
        currentSongIndex = songIdx;

        nowTitle.textContent = song.title;
        nowArtist.textContent = album.artist;

        const gradients = [
        'linear-gradient(145deg, #2d1b3d, #1a1a2e)',
        'linear-gradient(145deg, #0f3443, #1a2a3a)',
        'linear-gradient(145deg, #3d1c1c, #2a1a1a)',
        'linear-gradient(145deg, #1b3d2d, #1a2e1a)',
        'linear-gradient(145deg, #2d2d1b, #3d3d1a)'
        ];
        const thumbImg = nowThumb.querySelector('img');
        if (album.cover && thumbImg) {
        thumbImg.src = album.cover;
        thumbImg.style.display = 'block';
        thumbImg.onerror = function() {
        this.style.display = 'none';
        nowThumb.style.background = gradients[albumIdx % gradients.length];
        };
        nowThumb.style.background = '';
        } else if (thumbImg) {
        thumbImg.style.display = 'none';
        nowThumb.style.background = gradients[albumIdx % gradients.length];
        }

        const fileUrl = song.file;
        if (fileUrl && fileUrl !== '【MUSIC】' && !fileUrl.includes('【MUSIC】') && !fileUrl.includes('【SFX】')) {
        if (audio.src !== fileUrl) {
        audio.src = fileUrl;
        audio.load();
        }
        audio.play().then(() => {
        isPlaying = true;
        updatePlayButton();
        updateHighlights();
        }).catch(() => {
        isPlaying = false;
        updatePlayButton();
        updateHighlights();
        });
        } else {
        audio.pause();
        audio.src = '';
        isPlaying = false;
        updatePlayButton();
        updateHighlights();
        nowTitle.textContent = `${song.title} (占位)`;
        }

        if (song.duration) {
        totalTimeEl.textContent = song.duration;
        }
        progressFill.style.width = '0%';
        currentTimeEl.textContent = '0:00';
        updateHighlights();
        }

        /* =========================================================
        播放核心 — SFX
        ========================================================= */
        function playSfx(catIdx, soundIdx) {
        const cat = SFX_CATEGORIES[catIdx];
        if (!cat) return;
        const sound = cat.sounds[soundIdx];
        if (!sound) return;

        currentSfxCategory = catIdx;
        currentSfxIndex = soundIdx;

        nowTitle.textContent = sound.label;
        nowArtist.textContent = cat.title;

        const thumbImg = nowThumb.querySelector('img');
        if (thumbImg) {
        thumbImg.src = '#';
        thumbImg.style.display = 'none';
        nowThumb.style.background = 'linear-gradient(145deg, #2d1b3d, #1a1a2e)';
        }

        const fileUrl = sound.file;
        if (fileUrl && fileUrl !== '【SFX】' && !fileUrl.includes('【SFX】') && !fileUrl.includes('【MUSIC】')) {
        if (audio.src !== fileUrl) {
        audio.src = fileUrl;
        audio.load();
        }
        audio.play().then(() => {
        isPlaying = true;
        updatePlayButton();
        updateSfxHighlights();
        }).catch(() => {
        isPlaying = false;
        updatePlayButton();
        updateSfxHighlights();
        });
        } else {
        audio.pause();
        audio.src = '';
        isPlaying = false;
        updatePlayButton();
        updateSfxHighlights();
        nowTitle.textContent = `${sound.label} (占位)`;
        }

        if (sound.duration) {
        totalTimeEl.textContent = sound.duration;
        }
        progressFill.style.width = '0%';
        currentTimeEl.textContent = '0:00';
        updateSfxHighlights();
        }

        /* =========================================================
        上一首 / 下一首（根据当前 tab）
        ========================================================= */
        function playPrev() {
        if (activeTab === 'music') {
        const total = getTotalSongs();
        if (total === 0) return;
        let flat = getFlatIndex(currentAlbumIndex, currentSongIndex);
        flat = (flat - 1 + total) % total;
        const result = getSongByFlatIndex(flat);
        if (result) playSong(result.albumIdx, result.songIdx);
        } else {
        const total = getTotalSfx();
        if (total === 0) return;
        let flat = getSfxFlatIndex(currentSfxCategory, currentSfxIndex);
        flat = (flat - 1 + total) % total;
        const result = getSfxByFlatIndex(flat);
        if (result) playSfx(result.catIdx, result.soundIdx);
        }
        }

        function playNext() {
        if (activeTab === 'music') {
        const total = getTotalSongs();
        if (total === 0) return;
        let flat = getFlatIndex(currentAlbumIndex, currentSongIndex);
        flat = (flat + 1) % total;
        const result = getSongByFlatIndex(flat);
        if (result) playSong(result.albumIdx, result.songIdx);
        } else {
        const total = getTotalSfx();
        if (total === 0) return;
        let flat = getSfxFlatIndex(currentSfxCategory, currentSfxIndex);
        flat = (flat + 1) % total;
        const result = getSfxByFlatIndex(flat);
        if (result) playSfx(result.catIdx, result.soundIdx);
        }
        }

        /* =========================================================
        播放 / 暂停
        ========================================================= */
        function togglePlay() {
        if (audio.src && audio.src !== '') {
        if (isPlaying) {
        audio.pause();
        } else {
        audio.play().catch(() => {});
        }
        } else {
        if (activeTab === 'music') {
        const album = ALBUMS[currentAlbumIndex];
        if (album && album.songs[currentSongIndex]) {
        playSong(currentAlbumIndex, currentSongIndex);
        } else {
        playSong(0, 0);
        }
        } else {
        const cat = SFX_CATEGORIES[currentSfxCategory];
        if (cat && cat.sounds[currentSfxIndex]) {
        playSfx(currentSfxCategory, currentSfxIndex);
        } else {
        playSfx(0, 0);
        }
        }
        }
        }

        function updatePlayButton() {
        btnPlay.textContent = isPlaying ? '❚❚' : '▶';
        }

        /* =========================================================
        时间格式化
        ========================================================= */
        function formatTime(seconds) {
        if (!seconds || isNaN(seconds)) return '0:00';
        const m = Math.floor(seconds / 60);
        const s = Math.floor(seconds % 60);
        return `${m}:${String(s).padStart(2, '0')}`;
        }

        /* =========================================================
        进度更新
        ========================================================= */
        function updateProgress() {
        if (audio.duration && !isNaN(audio.duration) && audio.duration > 0) {
        const pct = (audio.currentTime / audio.duration) * 100;
        progressFill.style.width = `${Math.min(pct, 100)}%`;
        currentTimeEl.textContent = formatTime(audio.currentTime);
        totalTimeEl.textContent = formatTime(audio.duration);
        } else {
        if (activeTab === 'music') {
        const album = ALBUMS[currentAlbumIndex];
        if (album && album.songs[currentSongIndex]) {
        totalTimeEl.textContent = album.songs[currentSongIndex].duration || '0:00';
        }
        } else {
        const cat = SFX_CATEGORIES[currentSfxCategory];
        if (cat && cat.sounds[currentSfxIndex]) {
        totalTimeEl.textContent = cat.sounds[currentSfxIndex].duration || '0:00';
        }
        }
        }
        }

        /* =========================================================
        点击进度跳转
        ========================================================= */
        function seekTo(e) {
        const rect = progressBar.getBoundingClientRect();
        const x = (e.clientX - rect.left) / rect.width;
        const clamped = Math.max(0, Math.min(1, x));
        if (audio.duration && !isNaN(audio.duration) && audio.duration > 0) {
        audio.currentTime = clamped * audio.duration;
        }
        }

        /* =========================================================
        事件绑定
        ========================================================= */
        btnPlay.addEventListener('click', togglePlay);
        btnPrev.addEventListener('click', playPrev);
        btnNext.addEventListener('click', playNext);
        progressBar.addEventListener('click', seekTo);

        let isDragging = false;
        progressBar.addEventListener('mousedown', (e) => {
        isDragging = true;
        seekTo(e);
        });
        document.addEventListener('mousemove', (e) => {
        if (isDragging) seekTo(e);
        });
        document.addEventListener('mouseup', () => {
        isDragging = false;
        });

        audio.addEventListener('play', () => {
        isPlaying = true;
        updatePlayButton();
        if (activeTab === 'music') updateHighlights();
        else updateSfxHighlights();
        });

        audio.addEventListener('pause', () => {
        isPlaying = false;
        updatePlayButton();
        if (activeTab === 'music') updateHighlights();
        else updateSfxHighlights();
        });

        audio.addEventListener('ended', () => {
        playNext();
        });

        audio.addEventListener('timeupdate', updateProgress);

        audio.addEventListener('loadedmetadata', () => {
        totalTimeEl.textContent = formatTime(audio.duration);
        updateProgress();
        });

        // 键盘快捷键
        document.addEventListener('keydown', (e) => {
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
        if (e.key === ' ' || e.key === 'Space') {
        e.preventDefault();
        togglePlay();
        }
        if (e.key === 'ArrowRight' && (e.ctrlKey || e.metaKey)) {
        e.preventDefault();
        playNext();
        }
        if (e.key === 'ArrowLeft' && (e.ctrlKey || e.metaKey)) {
        e.preventDefault();
        playPrev();
        }
        });

        /* =========================================================
        初始化
        ========================================================= */
        renderAlbums();
        renderSfx();

        // 默认加载第一张专辑第一首（但不自动播放）
        const firstAlbum = ALBUMS[0];
        if (firstAlbum && firstAlbum.songs.length > 0) {
        const firstSong = firstAlbum.songs[0];
        nowTitle.textContent = firstSong.title;
        nowArtist.textContent = firstAlbum.artist;
        totalTimeEl.textContent = firstSong.duration;
        const thumbImg = nowThumb.querySelector('img');
        if (thumbImg && firstAlbum.cover) {
        thumbImg.src = firstAlbum.cover;
        } else if (thumbImg) {
        thumbImg.style.display = 'none';
        nowThumb.style.background = 'linear-gradient(145deg, #2d1b3d, #1a1a2e)';
        }
        currentAlbumIndex = 0;
        currentSongIndex = 0;
        updateHighlights();
        updatePlayButton();
        }

        console.log(`🎵 多专辑播放器已就绪 · 共 ${ALBUMS.length} 张专辑`);
        console.log(`🔊 SFX 分类已就绪 · 共 ${SFX_CATEGORIES.length} 个分类, ${getTotalSfx()} 个音效`);
        console.log('💡 点击曲目切换 · 空格键播放/暂停');
        console.log('📌 占位符: 【MUSIC】 / 【SFX】');
    </script>
</body>
</html>
